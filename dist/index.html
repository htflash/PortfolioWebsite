<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hunter Tortorella - Portfolio</title>
<link rel="stylesheet" href="style.css">
<style>
  body {
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #2f3e46 0%, #354f52 100%);
    color: #cad2c5;
    margin: 0;
    padding: 0;
  }

  header {
    text-align: center;
    padding: 2rem 1rem;
    background: linear-gradient(90deg, #52796f, #84a98c);
  }

  #header-art {
    max-width: 100%;
    height: auto;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    margin-bottom: 1rem;
    transition: transform 0.5s ease, filter 0.5s ease;
  }

  #header-art:hover {
    transform: scale(1.03);
    filter: brightness(1.1);
  }

  header h1 {
    font-family: monospace;
    margin: 0.5rem 0;
    font-size: 2.5rem;
  }

  header nav {
    margin-top: 1rem;
  }

  header nav a {
    text-decoration: none;
    color: #cad2c5;
    font-weight: bold;
    margin: 0 10px;
    position: relative;
    transition: color 0.3s;
  }

  header nav a:hover {
    color: #cb78ac;
  }

  main {
    max-width: 1200px;
    margin: 2rem auto;
    padding: 0 1rem;
  }

  main h2 {
    text-align: center;
    font-size: 2rem;
    margin-bottom: 1rem;
    color: #cb78ac;
  }

  main p {
    text-align: center;
    font-size: 1.1rem;
    margin-bottom: 2rem;
    line-height: 1.5em;
  }

  .flex {
    display: flex;
    flex-wrap: wrap;
    gap: 2rem;
    justify-content: center;
  }

  .box {
    background: linear-gradient(145deg, #354f52, #2f3e46);
    padding: 1rem;
    border-radius: 12px;
    flex: 1 1 300px;
    text-align: center;
    transition: transform 0.3s, box-shadow 0.3s;
    max-width: 350px;
    overflow: hidden;
  }

  .box:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 25px rgba(0,0,0,0.4);
  }

  .box h3 {
    margin: 0.5rem 0;
    color: #84a98c;
  }

  .box p a {
    color: #cb78ac;
    text-decoration: underline wavy #cb78ac;
    text-underline-offset: 0.2em;
    font-weight: bold;
  }

  /* Hover zoom effect for images and videos */
  .box img,
  .box video {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 0.5rem;
    object-fit: cover;
    transition: transform 0.5s ease, filter 0.5s ease;
    cursor: pointer;
  }

  .box img:hover,
  .box video:hover {
    transform: scale(1.05);
    filter: brightness(1.1);
  }

  footer {
    text-align: center;
    padding: 1.5rem;
    background: linear-gradient(90deg, #52796f, #84a98c);
    color: #cad2c5;
    border-top: 2px solid #cb78ac;
    margin-top: 3rem;
  }

  footer .social-links {
    margin-top: 1rem;
  }

  footer .social-links a {
    margin: 0 10px;
    color: #cb78ac;
    font-weight: bold;
    text-decoration: none;
    transition: color 0.3s;
  }

  footer .social-links a:hover {
    color: #fff;
  }
</style>
</head>
<body>

<header>
  <img src="Images/Joker Redesign.png" alt="Artwork" id="header-art">
  <h1><a href="index.html">Hunter Tortorella</a></h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="2d.html">2D Art</a>
    <a href="3d.html">3D Art</a>
    <a href="games.html">Games</a>
    <a href="aboutme.html">About Me</a>
  </nav>
</header>

<main>
  <h2>Welcome to My Portfolio!</h2>
  <p>Hi! I'm Hunter Tortorella. Explore my 2D art, 3D art, and games below....</p>

  <div class="flex">
    <div class="box">
      <h3>2D Art</h3>
      <img src="Images/Art_1.png" alt="2D Art Preview">
      <p><a href="2d.html">View Gallery</a></p>
    </div>

    <div class="box">
      <h3>3D Art</h3>
      <img src="Images/3d_9.png" alt="3D Art Preview">
      <p><a href="3d.html">View Gallery</a></p>
    </div>

    <div class="box">
      <h3>Games</h3>
      <video src="Videos/Games_1.mp4" autoplay muted loop playsinline></video>
      <p><a href="games.html">View Gallery</a></p>
    </div>
  </div>
</main>

<footer>
  <p>&copy; 2025 Hunter Tortorella</p>
  <div class="social-links">
    <a href="https://www.instagram.com/htflash_/" target="_blank">Instagram</a> |
    <a href="https://htflash1.itch.io/" target="_blank">Itch.io</a> |
  </div>
</footer>

</body>
</html>
