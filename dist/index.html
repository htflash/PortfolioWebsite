<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hunter Tortorella - Portfolio</title>
<link rel="stylesheet" href="style.css">
<style>
  :root {
    --text: #ffffff;
    --text-secondary: #cccccc;
    --background: #181818;
    --accent-dark: #2c2c2c;
    --accent: #ff5c00;
    --accent-light: #ffffff;
  }

  body {
    font-family: "Segoe UI", sans-serif;
    background: var(--background);
    color: var(--text);
    margin: 0;
    padding: 0;
  }

  /* --- Header --- */
  header {
    background: var(--accent-dark);
    border-bottom: 3px solid var(--accent);
    padding: 1rem 2rem;
    position: sticky;
    top: 0;
    z-index: 1000;
  }

  .header-container {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo a {
    font-size: 1.8rem;
    font-weight: bold;
    color: var(--accent);
    text-decoration: none;
  }

  nav a {
    margin-left: 1.5rem;
    text-decoration: none;
    color: var(--text);
    font-weight: 500;
    transition: color 0.3s;
  }

  nav a:hover {
    color: var(--accent-light);
  }

  /* --- Hero Section --- */
  .hero {
    position: relative;
    width: 100%;
    max-height: 500px;
    overflow: hidden;
  }

  .hero img {
    width: 100%;
    height: auto;
    object-fit: cover;
    display: block;
    filter: brightness(0.8);
  }

  .hero-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: var(--text);
    background: rgba(0, 0, 0, 0.5);
    padding: 1rem 2rem;
    border-radius: 12px;
  }

  .hero-text h1 {
    font-size: 2.5rem;
    margin: 0 0 0.5rem;
  }

  .hero-text p {
    font-size: 1.2rem;
    color: var(--text-secondary);
  }

  /* --- Main --- */
  main {
    max-width: 1200px;
    margin: 2rem auto;
    padding: 0 1rem;
    text-align: center;
  }

  main h2 {
    font-size: 2rem;
    margin-bottom: 1rem;
    color: var(--accent);
  }

  main p {
    font-size: 1.1rem;
    margin-bottom: 2rem;
    line-height: 1.5em;
    color: var(--text-secondary);
  }

  .flex {
    display: flex;
    flex-wrap: wrap;
    gap: 2rem;
    justify-content: center;
  }

  .box {
    background: var(--accent-dark);
    padding: 1rem;
    border-radius: 12px;
    flex: 1 1 300px;
    text-align: center;
    transition: transform 0.3s, box-shadow 0.3s;
    max-width: 350px;
    overflow: hidden;
  }

  .box:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 25px rgba(0,0,0,0.4);
  }

  .box h3 {
    margin: 0.5rem 0;
    color: var(--accent-light);
  }

  .box p a {
    color: var(--accent);
    text-decoration: underline solid var(--accent);
    text-underline-offset: 0.2em;
    font-weight: bold;
  }

  .box img,
  .box video {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 0.5rem;
    object-fit: cover;
    transition: transform 0.3s ease, filter 0.3s ease;
    cursor: pointer;
  }

  .box img:hover,
  .box video:hover {
    transform: scale(1.05);
    filter: brightness(1.1);
  }

  /* --- Footer --- */
  footer {
    text-align: center;
    padding: 1.5rem;
    background: var(--accent-dark);
    color: var(--text-secondary);
    border-top: 2px solid var(--accent);
    margin-top: 3rem;
  }

  footer .social-links {
    margin-top: 1rem;
  }

  footer .social-links a {
    margin: 0 10px;
    color: var(--accent);
    font-weight: bold;
    text-decoration: none;
    transition: color 0.3s;
  }

  
  footer .social-links a:hover {
    color: var(--accent-light);
  }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="header-container">
    <div class="logo">
      <a href="index.html">Hunter Tortorella</a>
    </div>
    <nav>
      <a href="index.html">Home</a>
      <a href="2d.html">2D Art</a>
      <a href="3d.html">3D Art</a>
      <a href="games.html">Games</a>
      <a href="aboutme.html">About Me</a>
    </nav>
  </div>
</header>

<!-- Hero Banner -->
<section class="hero">
  <img src="Images/Joker Redesign.png" alt="Artwork Banner">
  <div class="hero-text">
    <h1>Welcome to My Portfolio</h1>
    <p>Hi! I'm Hunter Tortorella. Explore my 2D art, 3D art, and games below.</p>
  </div>
</section>

<!-- Main -->
<main>
  <div class="flex">
    <div class="box">
      <h3>2D Art</h3>
      <img src="Images/Art_1.png" alt="2D Art Preview">
      <p><a href="2d.html">View Gallery</a></p>
    </div>

    <div class="box">
      <h3>3D Art</h3>
      <img src="Images/3d_9.png" alt="3D Art Preview">
      <p><a href="3d.html">View Gallery</a></p>
    </div>

    <div class="box">
      <h3>Games</h3>
      <video src="Videos/Games_1.mp4" autoplay muted loop playsinline></video>
      <p><a href="games.html">View Gallery</a></p>
    </div>
  </div>
</main>

<!-- Footer -->
<footer>
  <p>&copy; 2025 Hunter Tortorella</p>
  <div class="social-links">
    <a href="https://www.instagram.com/htflash_/" target="_blank">Instagram</a> |
    <a href="https://htflash1.itch.io/" target="_blank">Itch.io</a>
  </div>
</footer>

</body>
</html>
