<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hunter Tortorella - Portfolio</title>
<link rel="stylesheet" href="style.css">
<style>
  :root {
    --text: #ffffff;
    --text-secondary: #cccccc;
    --background: #181818;
    --accent-dark: #2c2c2c;
    --accent: #ff5c00;
    --accent-light: #ffffff;
  }

  body {
    font-family: "Segoe UI", sans-serif;
    background: var(--background);
    color: var(--text);
    margin: 0;
    padding: 0;
  }

header {
  text-align: center;
  padding: 0; /* remove bottom padding */
  background: var(--accent-dark);
}

.header-container {
  max-width: var(--max-width);
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--doublespacing) 2rem; /* controls height */
  border-bottom: 4px solid var(--accent); /* yellow line under content */
}





  .logo a {
    font-size: 1.8rem;
    font-weight: bold;
    color: var(--accent);
    text-decoration: none;
  }

  nav a {
    margin-left: 1.5rem;
    text-decoration: none;
    color: var(--text);
    font-weight: 600;
    transition: color 0.3s;
  }

  nav a:hover,
  nav a.active {
    color: var(--accent);
  }
  

  /* --- Hero Section --- */
  .hero {
    position: relative;
    width: 100%;
    max-height: 500px;
    overflow: hidden;
  }

  .hero img {
    width: 100%;
    height: auto;
    object-fit: cover;
    display: block;
    filter: brightness(0.8);
  }

  .hero-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: var(--text);
    background: rgba(0, 0, 0, 0.5);
    padding: 1rem 2rem;
    border-radius: 12px;
  }

  .hero-text h1 {
    font-size: 2.5rem;
    margin: 0 0 0.5rem;
  }

  .hero-text p {
    font-size: 1.2rem;
    color: var(--text-secondary);
  }

  /* --- Main --- */
  main {
    max-width: 1200px;
    margin: 2rem auto;
    padding: 0 1rem;
    text-align: center;
  }

  main h2 {
    font-size: 2rem;
    margin-bottom: 1rem;
    color: var(--accent);
  }

  main p {
    font-size: 1.1rem;
    margin-bottom: 2rem;
    line-height: 1.5em;
    color: var(--text-secondary);
  }

  /* --- Flex container for all boxes --- */
.flex {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 2rem;
}

/* --- Unified Box Style (clean & stable) --- */
.box {
  background: linear-gradient(145deg, var(--accent-dark), #1f1f1f);
  padding: 1.5rem;
  border-radius: 12px;
  flex: 1 1 320px;      /* Makes all boxes stay aligned on grid */
  max-width: 350px;    /* Prevents oversizing */
  box-sizing: border-box;
  text-align: center;
  border: 2px solid var(--accent);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  display: flex;
  flex-direction: column;
}

/* Hover effect */
.box:hover {
  transform: translateY(-8px);
  box-shadow: 0 15px 30px rgba(0,0,0,0.5);
}

/* Media inside box */
.box img,
.box video {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 1rem;
  object-fit: cover;
  cursor: pointer;
  transition: transform 0.3s ease, filter 0.3s ease;
}

.box img:hover,
.box video:hover {
  transform: scale(1.05);
  filter: brightness(1.1);
}

/* Box heading */
.box h3 {
  margin-bottom: 1rem;
  color: var(--accent-light);
  font-size: 1.5rem;
  text-transform: uppercase;
}

/* Box link button */
.box p a {
  display: inline-block;
  padding: 0.5rem 1rem;
  margin-top: auto;
  border-radius: 8px;
  text-decoration: none;
  font-weight: bold;
  color: var(--accent);
  border: 2px solid var(--accent);
  transition: 0.3s;
}

.box p a:hover {
  background: var(--accent);
  color: #fff;
  transform: scale(1.05);
}


/* Box headings */
.box h3 {
  margin-bottom: 1rem;
  color: var(--accent-light);
  font-size: 1.5rem;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Box media */
.box img,
.box video {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 1rem;
  object-fit: cover;
  transition: transform 0.3s ease, filter 0.3s ease;
  cursor: pointer;
}

.box img:hover,
.box video:hover {
  transform: scale(1.05);
  filter: brightness(1.1);
}

/* Box links */
.box p a {
  display: inline-block;
  margin-top: auto;
  padding: 0.5rem 1rem;
  color: var(--accent);
  text-decoration: none;
  font-weight: bold;
  border: 2px solid var(--accent);
  border-radius: 8px;
  transition: all 0.3s ease;
}

.box p a:hover {
  background: var(--accent);
  color: #fff;
  transform: scale(1.05);
}


  .box img:hover,
  .box video:hover {
    transform: scale(1.05);
    filter: brightness(1.1);
  }

  /* --- Footer --- */
  footer {
    text-align: center;
    padding: 1.5rem;
    background: var(--accent-dark);
    color: var(--text-secondary);
    border-top: 2px solid var(--accent);
    margin-top: 3rem;
  }

  footer .social-links {
    margin-top: 1rem;
  }

  footer .social-links a {
    margin: 0 10px;
    color: var(--accent);
    font-weight: bold;
    text-decoration: none;
    transition: color 0.3s;
  }

  footer .social-links a:hover {
    color: var(--accent-light);
  }

  
</style>
</head>
<body>



<!-- Header -->
<header>
  <div class="header-container">
    <div class="logo">
      <a href="index.html">Hunter Tortorella</a>
    </div>
    <nav>
      <a href="index.html">Home</a>
      <a href="2d.html">2D Art</a>
      <a href="3d.html">3D Art</a>
      <a href="games.html">Games</a>
      <a href="aboutme.html">About Me</a>
    </nav>
  </div>
</header>

<!-- Hero Banner -->
<section class="hero">
  <img src="Images/CAMERA1.png" alt="3D_1">
  <div class="hero-text">
    <h1>Welcome to My Portfolio</h1>
    <p>Hi! I'm Hunter Tortorella. Explore my 2D art, 3D art, and games below.</p>
  </div>
</section>

<!-- Main -->
<main>
  <div class="flex">
    <div class="box">
      <h3>2D Art</h3>
      <img src="Images/Art_1.png" alt="2D Art Preview">
      <p><a href="2d.html">View Gallery</a></p>
    </div>

    <div class="box">
      <h3>3D Art</h3>
      <img src="Images/3d_1.png" alt="3D Art Preview">
      <p><a href="3d.html">View Gallery</a></p>
    </div>

    <div class="box">
      <h3>Games</h3>
      <video class="game-video" src="Videos/Games_1.mp4" controls></video>
      <p><a href="games.html">View Gallery</a></p>
    </div>
  </div>
</main>
<!-- Showreels Section -->
<section id="showreels" style="margin-top: 4rem;">
  <h2 style="color: var(--accent); margin-bottom: 2rem;">Showreels</h2>

  <div class="flex">

    <!-- 3D Showreel -->
    <div class="box">
      <h3>3D Showreel</h3>
      <video src="Videos/3DArtShowReel.mp4" controls></video>
    </div>

    <!-- Game Showreel -->
    <div class="box">
      <h3>Game Showreel</h3>
      <video src="Videos/GameDesignShowReelWithAudio.mp4" controls></video>

    </div>

  </div>
</section>


<!-- Footer -->
<footer>
  <p>&copy; 2025 Hunter Tortorella</p>
  <div class="social-links">
    <a href="https://www.instagram.com/htflash_/" target="_blank">Instagram</a> |
    <a href="https://htflash1.itch.io/" target="_blank">Itch.io</a>
  </div>
</footer>

</body>
</html>
