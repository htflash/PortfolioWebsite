<body>
<header>

    <nav>
        <a href="index.html">Home</a>
        <a href="2d.html">2D Art</a>

        <a href="games.html">Games</a>
    </nav>
</header>

<main>
    <h2>Games Gallery</h2>
    <div id="gallery">
        <figure>
            <video src="videos/Games_1.mp4" autoplay muted loop playsinline></video>
            <figcaption>Game 1</figcaption>
        </figure>
        <figure>
            <video src="videos/Art_2.mov" autoplay muted loop playsinline></video>
            <figcaption>Game 2</figcaption>
        </figure>
        <figure>
            <video src="videos/Game_3.mov" autoplay muted loop playsinline></video>
            <figcaption>Game 3</figcaption>
        </figure>
    </div>
</main>

<div id="lightbox">
    <span id="prev">&#10094;</span>
    <div id="lightbox-content"></div>
    <span id="next">&#10095;</span>
</div>

<footer>
    <p>&copy; 2025 Hunter Tortorella</p>
</footer>

<script>
const lightbox = document.getElementById("lightbox");
const content = document.getElementById("lightbox-content");
const items = Array.from(document.querySelectorAll('#gallery img, #gallery video'));
let currentIndex = 0;

function showItem(index) {
    content.innerHTML = "";
    const item = items[index].cloneNode(true);
    if (item.tagName === "VIDEO") {
        item.controls = true;
        item.autoplay = true;
        item.loop = false;
        item.muted = false;
    }
    content.appendChild(item);
    lightbox.style.display = "flex";
    currentIndex = index;
}

items.forEach((item, index) => {
    item.addEventListener("click", () => showItem(index));
});
