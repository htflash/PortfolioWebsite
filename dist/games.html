  <style>
    main {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 5%;
    }

    h2 {
      text-align: center;
      color: #cb78ac; /* accent-light */
      margin-bottom: 2rem;
    }

    .game-section {
      margin-bottom: 3rem;
      background: linear-gradient(145deg, #354f52, #2f3e46);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .game-video {
      width: 100%;
      max-height: 600px;
      border-radius: 12px;
      object-fit: cover;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .game-video:hover {
      transform: scale(1.02);
    }

    .game-description {
      margin-top: 1rem;
      color: #cad2c5; /* text */
      font-size: 1rem;
      line-height: 1.5;
    }

    /* Optional: Fullscreen button for video */
    .game-video::-webkit-media-controls-fullscreen-button {
      display: block;
    }
  </style>
</head>
